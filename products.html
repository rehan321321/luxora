<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Products | LUXORA</title><style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#080808;--card:rgba(255,255,255,.08);--soft:rgba(255,255,255,.06);--text:#f5f5f7;--muted:#b8b8c2;--line:rgba(255,255,255,.1);--accent:#2997ff;--accent2:#7c3aed;--warning:#fbbf24;--shadow:0 22px 60px rgba(0,0,0,.38);--grad:linear-gradient(135deg,#0ea5e9,#7c3aed,#f43f5e)}body.light{--bg:#f5f7fb;--card:rgba(255,255,255,.86);--soft:rgba(255,255,255,.7);--text:#101114;--muted:#5f6470;--line:rgba(0,0,0,.08);--shadow:0 18px 45px rgba(0,0,0,.08)}body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(41,151,255,.14),transparent 26%),radial-gradient(circle at top right,rgba(124,58,237,.15),transparent 26%),var(--bg);color:var(--text);min-height:100vh}a{text-decoration:none;color:inherit}.container{width:min(1240px,92%);margin:auto}header{position:sticky;top:0;z-index:1000;background:rgba(10,10,12,.58);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}body.light header{background:rgba(255,255,255,.78)}.nav{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:18px}.logo{font-size:1.35rem;font-weight:900;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.nav-links,.actions{display:flex;gap:14px;align-items:center;flex-wrap:wrap}.nav-links a{color:var(--muted)}.nav-links a.active,.nav-links a:hover{color:var(--text)}button,.btn{border:1px solid var(--line);background:var(--soft);color:var(--text);padding:11px 17px;border-radius:999px;cursor:pointer;font-weight:800;transition:.25s}.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:white}button:hover,.btn:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.icon{width:44px;height:44px;padding:0}.hero{padding:72px 0 34px;text-align:center}.tag{display:inline-flex;padding:9px 14px;border-radius:999px;background:var(--soft);border:1px solid var(--line);color:var(--muted);font-size:.88rem;margin-bottom:16px}h1{font-size:clamp(2.3rem,5vw,4.7rem);line-height:1.05;letter-spacing:-2px;margin-bottom:12px}.gradient{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.muted,.sub{color:var(--muted);line-height:1.75}.toolbar{margin-top:28px;display:grid;grid-template-columns:1.2fr .8fr .8fr;gap:13px;padding:16px;background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);backdrop-filter:blur(16px)}input,select,textarea{width:100%;padding:13px 15px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);outline:none;font:inherit}.section{padding:20px 0 80px}.products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}.card{background:var(--card);border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(16px);transition:.3s}.card:hover{transform:translateY(-8px)}.product-top{height:300px;position:relative;overflow:hidden;background:linear-gradient(145deg,#0f172a,#111827,#1e1b4b);cursor:pointer}.product-top:before{content:"";position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.26),transparent 68%);top:-60px;right:-40px}.product-image{width:100%;height:100%;object-fit:cover;display:block;position:relative;z-index:1;transition:.35s}.card:hover .product-image{transform:scale(1.07)}.badge-row{position:absolute;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;gap:8px;z-index:2}.badge{padding:8px 12px;border-radius:999px;background:rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.18);color:white;font-size:.78rem;font-weight:800;backdrop-filter:blur(10px)}.body{padding:22px}.category{display:inline-block;padding:7px 11px;border-radius:999px;background:rgba(41,151,255,.13);color:#93c5fd;font-weight:800;font-size:.8rem;margin-bottom:10px}.body h3{font-size:1.35rem;margin-bottom:9px}.body p{color:var(--muted);line-height:1.65;min-height:76px;margin-bottom:14px}.rating{color:var(--warning);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:15px}.meta{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.price strong{font-size:1.35rem;display:block}.price span{color:var(--muted);text-decoration:line-through}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:22px;z-index:2000}.overlay.show{display:flex}.modal{width:min(1180px,100%);max-height:92vh;overflow:auto;background:var(--bg);border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);position:relative}.close{position:absolute;top:18px;right:18px;z-index:5;width:46px;height:46px;padding:0;font-size:1.2rem}.details-grid{display:grid;grid-template-columns:1.05fr .95fr;align-items:start}.details-visual{position:sticky;top:0;height:92vh;padding:34px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:16px;background:radial-gradient(circle at center,rgba(255,255,255,.06),transparent 45%)}.stage{height:520px;border-radius:28px;overflow:hidden;background:linear-gradient(145deg,#0f172a,#111827,#1e1b4b);border:1px solid var(--line)}.detail-main-image{width:100%;height:100%;object-fit:cover;display:block}.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}.thumb{height:82px;border-radius:18px;overflow:hidden;border:1px solid var(--line);cursor:pointer;background:var(--soft)}.thumb img{width:100%;height:100%;object-fit:cover}.thumb.active{border-color:rgba(41,151,255,.75);box-shadow:0 0 0 2px rgba(41,151,255,.18) inset}.info{padding:40px 34px}.mini{display:inline-block;padding:8px 13px;border-radius:999px;background:rgba(41,151,255,.13);color:#93c5fd;font-weight:800;font-size:.8rem;margin-bottom:12px}.info h2{font-size:clamp(2rem,4vw,3rem);line-height:1.05;margin-bottom:12px}.price-large{display:flex;gap:14px;align-items:end;margin:18px 0;flex-wrap:wrap}.price-large strong{font-size:2rem}.price-large span{text-decoration:line-through;color:var(--muted)}.pills{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px}.pill{padding:9px 13px;border-radius:999px;background:var(--soft);border:1px solid var(--line);color:var(--muted);font-size:.9rem}.green{color:#bbf7d0;background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.22)}.features{display:grid;gap:11px;margin:20px 0}.feature,.spec,.review-item{padding:14px 15px;border-radius:17px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);line-height:1.65}.spec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin:20px 0}.spec strong{display:block;color:var(--text);margin-bottom:5px}.review-box{margin-top:25px;padding:18px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.04)}.rating-summary{display:grid;grid-template-columns:130px 1fr;gap:16px;align-items:center;margin:16px 0}.score{text-align:center;padding:17px;border-radius:20px;border:1px solid var(--line);background:linear-gradient(135deg,rgba(41,151,255,.16),rgba(124,58,237,.16))}.score strong{font-size:2rem;display:block}.bars{display:grid;gap:8px}.barrow{display:grid;grid-template-columns:42px 1fr 30px;gap:9px;color:var(--muted);font-size:.86rem;align-items:center}.bar{height:8px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08)}.fill{height:100%;background:linear-gradient(135deg,var(--warning),#fb7185)}.review-form{display:grid;gap:11px;margin:15px 0}.review-form input,.review-form textarea{border-radius:16px}.review-form textarea{min-height:90px;resize:vertical}.star-btn{width:37px;height:37px;padding:0;color:var(--muted)}.star-btn.active{color:var(--warning);border-color:rgba(251,191,36,.55)}.review-list{display:grid;gap:11px}.review-head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:7px}.empty{text-align:center;color:var(--muted);padding:35px;border:1px dashed var(--line);border-radius:25px;grid-column:1/-1}@media(max-width:1050px){.products-grid{grid-template-columns:repeat(2,1fr)}.details-grid{grid-template-columns:1fr}.details-visual{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--line)}.stage{height:420px}}@media(max-width:720px){.nav-links{display:none}.toolbar,.products-grid,.spec-grid,.rating-summary{grid-template-columns:1fr}.stage{height:340px}.info,.details-visual{padding:22px}.thumbs{grid-template-columns:repeat(2,1fr)}}
</style></head><body><header><div class="container nav"><a href="index.html" class="logo">LUXORA</a><nav class="nav-links"><a href="index.html">Home</a><a class="active" href="products_connected.html">Products</a><a href="about.html">about</a> <a href="contact.html">contact</a><a href="cart.html">Cart</a></nav><div class="actions"><button class="icon" id="themeToggle">◐</button><a href="cart.html" class="btn primary">View Cart</a></div></div></header><section class="hero"><div class="container"><div class="tag">Admin connected products</div><h1>Explore <span class="gradient">premium products</span></h1><p class="sub">Admin panel se add ki gayi full product information yaha card aur View Details me show hogi.</p><div class="toolbar"><input id="searchInput" placeholder="Search products..."><select id="categoryFilter"><option value="all">All Categories</option><option>Audio</option><option>Laptop</option><option>Mobile</option><option>Wearable</option><option>Accessory</option><option>Camera</option><option>Gaming</option><option>Tablet</option></select><select id="sortFilter"><option value="default">Sort By</option><option value="low-high">Price Low to High</option><option value="high-low">Price High to Low</option><option value="top-rated">Top Rated</option></select></div></div></section><section class="section"><div class="container"><div class="products-grid" id="productsGrid"></div></div></section><div class="overlay" id="overlay"><div class="modal"><button class="close" id="closeBtn">✕</button><div class="details-grid"><div class="details-visual"><div class="stage" id="stage"></div><div class="thumbs" id="thumbs"></div></div><div class="info" id="info"></div></div></div></div><script>
const STORAGE_KEY='luxora-admin-products',REVIEW_KEY='luxora-real-product-reviews';let products=[];let selectedReviewRating=5;const fallback=[{id:'demo1',name:'AeroPods Max',category:'Audio',price:49999,oldPrice:57999,stock:'In Stock',tag:'Best Seller',image:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=900&q=80',gallery:['https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=900&q=80','https://images.unsplash.com/photo-1546435770-a3e426bf472b?auto=format&fit=crop&w=900&q=80'],short:'High-fidelity premium headphones with immersive luxury sound.',description:'AeroPods Max is designed for users who want cinematic audio, elegant premium materials, and powerful sound quality.',features:['Adaptive premium audio tuning','Luxury comfort design','Spatial sound with deep bass','Premium finish'],specs:{Battery:'30 Hours',Connectivity:'Bluetooth 5.3',Warranty:'1 Year',Build:'Luxury Metal Finish'},rating:4.8,reviews:1248,warranty:'1 Year Warranty'}];
const $=id=>document.getElementById(id);const savedTheme=localStorage.getItem('luxora-theme');if(savedTheme==='light')document.body.classList.add('light');themeToggle.onclick=()=>{document.body.classList.toggle('light');localStorage.setItem('luxora-theme',document.body.classList.contains('light')?'light':'dark')};
function getAdminProducts(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){return[]}}function normalize(p,i){const gallery=Array.isArray(p.gallery)&&p.gallery.length?p.gallery:(p.image?[p.image]:[]);return{id:p.id||('p'+i),name:p.name||'Product',category:p.category||'Accessory',price:Number(p.price||0),oldPrice:Number(p.oldPrice||p.price||0),stock:p.stock==='Low Stock'?'Limited':(p.stock||'In Stock'),tag:p.tag||'Featured',image:p.image||gallery[0]||fallback[0].image,gallery:gallery.length?gallery:[fallback[0].image],short:p.short||p.description||'Premium product.',description:p.description||p.fullDescription||p.short||'Premium product information.',features:Array.isArray(p.features)?p.features:[],specs:p.specs&&typeof p.specs==='object'?p.specs:{Category:p.category||'Accessory',Stock:p.stock||'In Stock'},rating:Number(p.rating||4.6),reviews:Number(p.reviews||0),warranty:p.warranty||'1 Year Warranty',customerReviews:Array.isArray(p.customerReviews)?p.customerReviews:[]}}
function load(){const admin=getAdminProducts().map(normalize);products=admin.length?admin:fallback;renderProducts()}function stars(r){let n=Math.round(Number(r)||0);return'★'.repeat(n)+'☆'.repeat(Math.max(0,5-n))}function fmt(v){return'₹'+Number(v||0).toLocaleString('en-IN')}function safe(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function renderProducts(){const q=searchInput.value.trim().toLowerCase(),cat=categoryFilter.value,sort=sortFilter.value;let list=products.filter(p=>(p.name+p.category+p.short+p.description).toLowerCase().includes(q)&&(cat==='all'||p.category===cat));if(sort==='low-high')list.sort((a,b)=>a.price-b.price);if(sort==='high-low')list.sort((a,b)=>b.price-a.price);if(sort==='top-rated')list.sort((a,b)=>b.rating-a.rating);productsGrid.innerHTML=list.length?list.map(p=>`<div class="card"><div class="product-top" data-id="${p.id}"><div class="badge-row"><span class="badge">${safe(p.tag)}</span><span class="badge">${safe(p.stock)}</span></div><img class="product-image" src="${safe(p.image)}" alt="${safe(p.name)}" onerror="this.src='https://placehold.co/700x500/111827/fff?text=LUXORA'"></div><div class="body"><span class="category">${safe(p.category)}</span><h3>${safe(p.name)}</h3><p>${safe(p.short)}</p><div class="rating"><span>${stars(p.rating)}</span><span class="muted">${p.rating} (${p.reviews} reviews)</span></div><div class="meta"><div class="price"><strong>${fmt(p.price)}</strong><span>${p.oldPrice?fmt(p.oldPrice):''}</span></div><button data-id="${p.id}">View Details</button></div></div></div>`).join(''):'<div class="empty">No products found. Admin panel se product add karo.</div>'}
productsGrid.onclick=e=>{const t=e.target.closest('[data-id]');if(t)openDetails(t.dataset.id)};searchInput.oninput=renderProducts;categoryFilter.onchange=renderProducts;sortFilter.onchange=renderProducts;
function reviewsData(){try{return JSON.parse(localStorage.getItem(REVIEW_KEY)||'{}')}catch(e){return{}}}function saveReviews(d){localStorage.setItem(REVIEW_KEY,JSON.stringify(d))}function allReviews(p){const real=reviewsData()[String(p.id)]||[];return[...real,...(p.customerReviews||[])].map((r,i)=>({name:r.name||r.reviewerName||`Customer ${i+1}`,comment:r.comment||r.feedback||'Good product experience.',rating:Number(r.rating||p.rating||5),date:r.date||'Verified review'}))}function stats(p){const rs=allReviews(p),counts={5:0,4:0,3:0,2:0,1:0};if(!rs.length)return{average:Number(p.rating||5),total:Number(p.reviews||0),counts,reviews:[]};let sum=0;rs.forEach(r=>{const n=Math.min(5,Math.max(1,Math.round(r.rating)));counts[n]++;sum+=r.rating});return{average:(sum/rs.length).toFixed(1),total:rs.length,counts,reviews:rs}}
function bars(st){const max=Math.max(...Object.values(st.counts),1);return[5,4,3,2,1].map(n=>`<div class="barrow"><span>${n}★</span><div class="bar"><div class="fill" style="width:${Math.round((st.counts[n]/max)*100)}%"></div></div><span>${st.counts[n]}</span></div>`).join('')}
function reviewHTML(p){const st=stats(p),list=st.reviews.slice(0,8);return`<div class="review-box" id="reviewSection"><h3>Ratings & Reviews</h3><p class="muted">Customers yaha product quality, design, delivery aur overall experience share kar sakte hain.</p><div class="rating-summary"><div class="score"><strong>${st.average}</strong><span style="color:var(--warning)">${stars(st.average)}</span><p class="muted">${st.total} reviews</p></div><div class="bars">${bars(st)}</div></div><form class="review-form" onsubmit="submitReview(event,'${p.id}')"><b>Add Your Review</b><div>${[1,2,3,4,5].map(n=>`<button type="button" class="star-btn ${n<=selectedReviewRating?'active':''}" onclick="setReviewRating(${n})">★</button>`).join('')} <span id="selectedRatingText" class="muted">${selectedReviewRating}/5</span></div><input id="reviewName" required placeholder="Your name"><textarea id="reviewComment" required placeholder="Product kaisa hai? Quality, design, delivery likho..."></textarea><button class="primary">Submit Review</button></form><div class="review-list">${list.length?list.map(r=>`<div class="review-item"><div class="review-head"><b>${safe(r.name)}</b><span class="muted">${safe(r.date)}</span></div><p><span style="color:var(--warning)">${stars(r.rating)}</span> ${safe(r.comment)}</p></div>`).join(''):'<div class="review-item">Abhi review nahi hai. Pehla review add karo.</div>'}</div></div>`}
function openDetails(id){const p=products.find(x=>String(x.id)===String(id));if(!p)return;selectedReviewRating=5;stage.innerHTML=`<img id="activeImg" class="detail-main-image" src="${safe(p.gallery[0]||p.image)}" alt="${safe(p.name)}" onerror="this.src='https://placehold.co/900x700/111827/fff?text=LUXORA'">`;thumbs.innerHTML=p.gallery.slice(0,4).map((img,i)=>`<div class="thumb ${i===0?'active':''}" onclick="changeImg('${safe(img)}',this)"><img src="${safe(img)}"></div>`).join('');info.innerHTML=`<span class="mini">${safe(p.category)}</span><h2>${safe(p.name)}</h2><p class="sub">${safe(p.description)}</p><div class="rating"><span>${stars(p.rating)}</span><span class="muted">${p.rating} rating • ${p.reviews} reviews</span></div><div class="price-large"><strong>${fmt(p.price)}</strong><span>${p.oldPrice?fmt(p.oldPrice):''}</span></div><div class="pills"><span class="pill green">${safe(p.stock)}</span><span class="pill">${safe(p.warranty)}</span><span class="pill">Free Delivery</span></div><div class="features">${(p.features.length?p.features:['Premium product quality','Added from admin panel','Ready for store display']).map(f=>`<div class="feature">• ${safe(f)}</div>`).join('')}</div><div class="spec-grid">${Object.entries(p.specs||{}).map(([k,v])=>`<div class="spec"><strong>${safe(k)}</strong><span>${safe(v)}</span></div>`).join('')}</div><div class="actions"><button class="primary" onclick="addToCart('${safe(p.name)}',${p.price})">Add to Cart</button><button onclick="buyNow('${safe(p.name)}',${p.price})">Buy Now</button></div>${reviewHTML(p)}`;overlay.classList.add('show');document.body.style.overflow='hidden'}
function changeImg(src,el){activeImg.src=src;document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));el.classList.add('active')}function closeModal(){overlay.classList.remove('show');document.body.style.overflow=''}closeBtn.onclick=closeModal;overlay.onclick=e=>{if(e.target===overlay)closeModal()};document.onkeydown=e=>{if(e.key==='Escape')closeModal()};
function setReviewRating(n){selectedReviewRating=n;document.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('active',i<n));selectedRatingText.textContent=n+'/5'}function submitReview(e,id){e.preventDefault();const p=products.find(x=>String(x.id)===String(id));const data=reviewsData();if(!data[id])data[id]=[];data[id].unshift({name:reviewName.value.trim(),comment:reviewComment.value.trim(),rating:selectedReviewRating,date:new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})});saveReviews(data);const st=stats(p);p.rating=Number(st.average);p.reviews=st.total;reviewSection.outerHTML=reviewHTML(p);renderProducts();alert('Thanks! Review added.')}function addToCart(name,price){const cart=JSON.parse(localStorage.getItem('luxora-cart')||'[]');const ex=cart.find(x=>x.name===name);ex?ex.qty=(ex.qty||1)+1:cart.push({name,price,qty:1});localStorage.setItem('luxora-cart',JSON.stringify(cart));alert(name+' added to cart!')}function buyNow(n,p){addToCart(n,p);location.href='cart.html'}window.changeImg=changeImg;window.setReviewRating=setReviewRating;window.submitReview=submitReview;window.addToCart=addToCart;window.buyNow=buyNow;window.addEventListener('storage',e=>{if(e.key===STORAGE_KEY)load()});load();
</script></body></html>
